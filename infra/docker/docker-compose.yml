services:
  db:
    image: postgres:16-alpine
    container_name: tiktok-scrapper-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tiktok_scrapper}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tiktok_scrapper}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
